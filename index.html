<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfoGraphic Generator Studio</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="XML風タグによるテキスト解析と透過PNG配置を組み合わせた、ブラウザ完結の図解画像生成ツール。SNSやブログ用の定型図解を高速に作成。">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="css/style.css?v=17">
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
  
  <!-- Libraries (Dexie.js and Fabric.js) -->
  <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Loading InfoGraphic Studio...</div>
  </div>



  <!-- Header / Navbar -->
  <header>
    <div class="logo-container">
      <div class="logo-icon"><i class="fa-solid fa-shapes"></i></div>
      <div class="logo-text">InfoGraphic Studio</div>
    </div>
    
    <!-- Canvas Navigation & Editor Toggles -->
    <div class="header-controls">
      <!-- Mobile Sidebar Toggles -->
      <button id="btn-toggle-editor" class="btn btn-icon mobile-only" title="エディタを開く/閉じる">
        <i class="fa-solid fa-code"></i>
      </button>
      <button id="btn-toggle-assets" class="btn btn-icon mobile-only" title="ライブラリを開く/閉じる">
        <i class="fa-solid fa-folder-open"></i>
      </button>

      <!-- Zoom Controllers -->
      <div class="zoom-controls">
        <button id="btn-zoom-out" class="zoom-btn" title="ズームアウト"><i class="fa-solid fa-minus"></i></button>
        <span id="zoom-label" class="zoom-label">100%</span>
        <button id="btn-zoom-in" class="zoom-btn" title="ズームイン"><i class="fa-solid fa-plus"></i></button>
        <button id="btn-zoom-fit" class="zoom-btn" title="画面に合わせる"><i class="fa-solid fa-maximize"></i></button>
      </div>

      <!-- Theme Switcher -->
      <button id="btn-toggle-theme" class="btn btn-icon" title="ダーク/ライトモード切替">
        <i class="fa-solid fa-moon"></i>
      </button>



      <!-- Clear Canvas Elements -->
      <button id="btn-clear-canvas" class="btn btn-danger" title="キャンバスの透過画像をクリア">
        <i class="fa-solid fa-trash-can"></i> クリア
      </button>

      <!-- Download Button -->
      <button id="btn-download" class="btn btn-primary">
        <i class="fa-solid fa-download"></i> 高解像度ダウンロード
      </button>
    </div>
  </header>

  <!-- Main Split Layout -->
  <main>
    <!-- 1. Text Editor Sidebar (Left) -->
    <section class="editor-sidebar">
      <div class="editor-section-header text-editor-header">
        <span><i class="fa-solid fa-code"></i> テキストコードエディタ</span>
        <i class="fa-solid fa-chevron-up toggle-chevron" style="margin-left: auto;"></i>
        <button id="btn-reset-text" class="shortcut-btn" title="デフォルト文面に戻す" style="margin-left: 10px;"><i class="fa-solid fa-rotate-left"></i></button>
      </div>
 
      <div class="text-editor-container">
        <!-- Quick Tag Insert Tools -->
        <div class="xml-shortcuts">
          <button class="shortcut-btn" data-tag="title" title="タイトルタグの挿入">&lt;title&gt;</button>
          <button class="shortcut-btn" data-tag="section" title="セクションタグの挿入">&lt;section1&gt;</button>
          <button class="shortcut-btn" data-tag="row1" title="Row 1 (大見出し)">&lt;row1&gt;</button>
          <button class="shortcut-btn" data-tag="row2" title="Row 2 (説明文)">&lt;row2&gt;</button>
          <button class="shortcut-btn" data-tag="row3" title="Row 3 (補足文)">&lt;row3&gt;</button>
          <button id="btn-clear-text" class="shortcut-btn" style="background: rgba(239,68,68,0.1); color: var(--danger-color); border-color: rgba(239,68,68,0.2);" title="エディタをクリア"><i class="fa-solid fa-eraser"></i> クリア</button>
        </div>
 
        <!-- Textarea Container -->
        <div class="textarea-container">
          <textarea id="xml-input" placeholder="ここにXMLタグを入力してください..." spellcheck="false"></textarea>
        </div>
      </div>

      <!-- Title Image Settings -->
      <div class="editor-section-header title-image-header">
        <span><i class="fa-solid fa-heading"></i> タイトル画像設定</span>
        <i class="fa-solid fa-chevron-up toggle-chevron" style="margin-left: auto;"></i>
      </div>
      <div class="title-image-container">
        <div class="section-image-row">
          <span class="row-label">タイトルの右画像:</span>
          <button class="btn btn-sm btn-select-title-image"><i class="fa-solid fa-file-image"></i> 設定</button>
          <div class="sec-img-preview" id="title-img-preview" style="display: none;">
            <img src="" alt="preview">
            <button class="btn-clear-title-image" title="画像を削除"><i class="fa-solid fa-xmark"></i></button>
          </div>
        </div>
      </div>

      <!-- Section Images Settings -->
      <div class="editor-section-header sec-images-header">
        <span><i class="fa-solid fa-image"></i> セクション画像設定</span>
        <i class="fa-solid fa-chevron-up toggle-chevron" style="margin-left: auto;"></i>
      </div>
      <div class="section-images-container">
        <div class="section-image-row" data-index="0">
          <span class="row-label">セクション 1:</span>
          <button class="btn btn-sm btn-select-sec-image" data-index="0"><i class="fa-solid fa-file-image"></i> 設定</button>
          <div class="sec-img-preview" id="sec-img-preview-0" style="display: none;">
            <img src="" alt="preview">
            <button class="btn-clear-sec-image" data-index="0" title="画像を削除"><i class="fa-solid fa-xmark"></i></button>
          </div>
        </div>
        <div class="section-image-row" data-index="1">
          <span class="row-label">セクション 2:</span>
          <button class="btn btn-sm btn-select-sec-image" data-index="1"><i class="fa-solid fa-file-image"></i> 設定</button>
          <div class="sec-img-preview" id="sec-img-preview-1" style="display: none;">
            <img src="" alt="preview">
            <button class="btn-clear-sec-image" data-index="1" title="画像を削除"><i class="fa-solid fa-xmark"></i></button>
          </div>
        </div>
        <div class="section-image-row" data-index="2">
          <span class="row-label">セクション 3:</span>
          <button class="btn btn-sm btn-select-sec-image" data-index="2"><i class="fa-solid fa-file-image"></i> 設定</button>
          <div class="sec-img-preview" id="sec-img-preview-2" style="display: none;">
            <img src="" alt="preview">
            <button class="btn-clear-sec-image" data-index="2" title="画像を削除"><i class="fa-solid fa-xmark"></i></button>
          </div>
        </div>
        <div class="section-image-row" data-index="3">
          <span class="row-label">セクション 4:</span>
          <button class="btn btn-sm btn-select-sec-image" data-index="3"><i class="fa-solid fa-file-image"></i> 設定</button>
          <div class="sec-img-preview" id="sec-img-preview-3" style="display: none;">
            <img src="" alt="preview">
            <button class="btn-clear-sec-image" data-index="3" title="画像を削除"><i class="fa-solid fa-xmark"></i></button>
          </div>
        </div>
        <div class="section-image-row" data-index="4">
          <span class="row-label">セクション 5:</span>
          <button class="btn btn-sm btn-select-sec-image" data-index="4"><i class="fa-solid fa-file-image"></i> 設定</button>
          <div class="sec-img-preview" id="sec-img-preview-4" style="display: none;">
            <img src="" alt="preview">
            <button class="btn-clear-sec-image" data-index="4" title="画像を削除"><i class="fa-solid fa-xmark"></i></button>
          </div>
        </div>
      </div>
    </section>

    <!-- 2. Interactive Canvas Workspace (Center) -->
    <section id="workspace" class="workspace">
      <div class="canvas-container-outer">
        <!-- Fabric.js active canvas -->
        <canvas id="canvas"></canvas>
      </div>
      

    </section>

    <!-- 3. Assets Library Sidebar (Right) -->
    <section class="assets-sidebar">
      <!-- Tabs -->
      <div class="tabs-header">
        <button id="tab-templates" class="tab-btn active"><i class="fa-solid fa-image"></i> 背景</button>
        <button id="tab-overlays" class="tab-btn"><i class="fa-solid fa-face-smile"></i> 装飾PNG</button>
      </div>

      <!-- Tab Panes Content -->
      <div class="tabs-content">
        <!-- Background Templates Panel -->
        <div id="pane-templates" class="tab-pane active">
          <!-- Upload Background -->
          <label class="upload-zone" id="upload-template-zone">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <strong>背景画像のアップロード</strong>
            <span>JPG / PNG (クリックまたはドロップ)</span>
            <input type="file" id="input-upload-template" accept="image/jpeg, image/png">
          </label>
          
          <!-- Template List -->
          <div class="editor-section-header">
            <span>マイテンプレート</span>
            <i class="fa-solid fa-chevron-up toggle-chevron mobile-only" style="margin-left: auto;"></i>
          </div>
          <div class="assets-grid" id="templates-grid">
            <!-- Programmatically populated -->
          </div>
        </div>

        <!-- Overlays Panel -->
        <div id="pane-overlays" class="tab-pane">
          <!-- Upload Overlay PNG -->
          <label class="upload-zone" id="upload-overlay-zone">
            <i class="fa-solid fa-icons"></i>
            <strong>透過PNGのアップロード</strong>
            <span>透過PNG画像 (クリックまたはドロップ)</span>
            <input type="file" id="input-upload-overlay" accept="image/png">
          </label>
          
          <!-- Overlays List -->
          <div class="editor-section-header">
            <span>マイスタンプ・アイコン</span>
            <i class="fa-solid fa-chevron-up toggle-chevron mobile-only" style="margin-left: auto;"></i>
          </div>
          <div class="assets-grid" id="overlays-grid">
            <!-- Programmatically populated -->
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Mobile Download Modal (for saving on iOS/Android browsers) -->
  <div id="mobile-download-modal" class="mobile-modal">
    <div class="mobile-modal-content">
      <div class="mobile-modal-title">
        <i class="fa-solid fa-circle-info" style="color: var(--accent-color);"></i>
        <span>画像を長押しして保存してください</span>
      </div>
      <div class="mobile-modal-img-wrap">
        <img id="mobile-download-img" alt="書き出された図解画像">
      </div>
      <button id="btn-close-download-modal" class="btn btn-primary" style="width: 100%;">
        <i class="fa-solid fa-xmark"></i> 閉じる
      </button>
    </div>
  </div>

  <!-- Select Overlay Modal for Section Images -->
  <div id="select-overlay-modal" class="mobile-modal">
    <div class="mobile-modal-content select-modal-content" style="max-width: 480px; max-height: 80vh;">
      <div class="mobile-modal-title" style="justify-content: space-between; width: 100%; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 8px;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <i class="fa-solid fa-images" style="color: var(--accent-color);"></i>
          <span>セクション透過画像の選択</span>
        </div>
        <button id="btn-close-select-modal" class="btn btn-icon" style="border: none; background: transparent; color: var(--text-secondary); cursor: pointer;" title="閉じる">
          <i class="fa-solid fa-xmark" style="font-size: 16px;"></i>
        </button>
      </div>
      <div class="modal-body" style="width: 100%; overflow-y: auto; flex: 1; padding-right: 4px;">
        <div class="assets-grid" id="modal-overlays-grid">
          <!-- Populated programmatically from IndexedDB -->
        </div>
      </div>
    </div>
  </div>

  <!-- Float Toast Notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Hidden Base Canvas for high-res drawing -->
  <canvas id="hidden-base-canvas" style="display: none;"></canvas>

  <!-- Mobile Navigation Bar (visible on mobile only) -->
  <div class="mobile-nav-bar">
    <button id="mbtn-text" class="mobile-nav-btn active">
      <i class="fa-solid fa-code"></i>
      <span>テキスト</span>
    </button>
    <button id="mbtn-templates" class="mobile-nav-btn">
      <i class="fa-solid fa-image"></i>
      <span>背景</span>
    </button>
    <button id="mbtn-overlays" class="mobile-nav-btn">
      <i class="fa-solid fa-face-smile"></i>
      <span>スタンプ</span>
    </button>

  </div>

  <!-- Code Scripts -->
  <script src="js/db.js?v=17"></script>
  <script src="js/config.js?v=17"></script>
  <script src="js/text-engine.js?v=17"></script>
  <script src="js/app.js?v=17"></script>
</body>
</html>
